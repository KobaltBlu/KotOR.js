# Standalone config so plugins resolve only from extension node_modules
# (extending ../../.eslintrc.yml caused "couldn't determine plugin @typescript-eslint uniquely")
root: true
ignorePatterns:
  - "server/out/**"
extends:
  - eslint:recommended
  - plugin:import/recommended
  - plugin:import/typescript
parser: "@typescript-eslint/parser"
parserOptions:
  ecmaVersion: 2022
  sourceType: module
  ecmaFeatures:
    jsx: true
plugins:
  - "@typescript-eslint"
  - import
env:
  node: true
  browser: true
  es2022: true
settings:
  import/core-modules:
    - "@vscode/debugadapter"
    - "@vscode/debugprotocol"
    - "vscode"
    - "vscode-languageclient/node"
  import/parsers:
    "@typescript-eslint/parser": [".ts", ".tsx"]
  import/resolver:
    node:
      extensions:
        - .d.ts
        - .js
        - .jsx
        - .ts
        - .tsx
  import/internal-regex: "^(@forge|@kotor)/"

rules:
  "@typescript-eslint/explicit-function-return-type": off
  "@typescript-eslint/no-explicit-any": warn
  "@typescript-eslint/no-unused-vars":
    - warn
    - argsIgnorePattern: "^_"
      varsIgnorePattern: "^_"
  no-console: warn
  no-debugger: warn
  no-unused-vars: off
  import/no-duplicates: warn
  import/order:
    - warn
    - groups:
        - builtin
        - external
        - index
        - internal
        - parent
        - sibling
      newlines-between: always
      alphabetize:
        order: asc
        caseInsensitive: true
  import/no-unresolved:
    - warn
    - ignore:
        - "^\\./"
        - "^\\.\\./"
        - "^@forge/"
        - "^@kotor/"
        - "^@vscode/"
        - "^path$"
        - "^vscode-languageclient"
        - "^vscode$"

globals:
  Thenable: readonly

overrides:
  - files:
      - "src/webview/**/*.ts"
      - "src/webview/**/*.tsx"
    parserOptions:
      # Resolve from repo root when ESLint is run from root
      project: "extensions/kotor-forge-vscode/tsconfig.webview.json"
    rules:
      no-console: off
