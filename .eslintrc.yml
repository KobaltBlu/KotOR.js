extends:
  - eslint:recommended
  - plugin:import/recommended
  - plugin:import/typescript
parser: "@typescript-eslint/parser"
parserOptions:
  ecmaVersion: 2022
  sourceType: module
  ecmaFeatures:
    jsx: true
plugins:
  - "@typescript-eslint"
  - import
env:
  node: true
  browser: true
  es2022: true
settings:
  import/resolver: node
rules:
  # TypeScript specific rules (warn only - do not block build/debug)
  "@typescript-eslint/no-unused-vars":
    - warn
    - argsIgnorePattern: "^_"
      varsIgnorePattern: "^_"
  "@typescript-eslint/explicit-function-return-type": off
  "@typescript-eslint/no-explicit-any": warn

  # General code quality
  no-console: warn
  no-debugger: warn
  no-unused-vars: off # Use TypeScript version instead

  # Import rules (warn only - do not block build/debug)
  import/order:
    - warn
    - groups:
        - builtin
        - external
        - internal
        - parent
        - sibling
        - index
      newlines-between: always
      alphabetize:
        order: asc
        caseInsensitive: true
      pathGroups:
        # Shallower parent imports first (../../ before ../../../)
        - pattern: "../../[^.]*/**"
          group: parent
          position: before
        - pattern: "../../../**"
          group: parent
          position: after
  import/no-unresolved:
    - warn
    - ignore:
        - "^\\./"   # relative imports - assume paths are correct
        - "^\\.\\." # parent relative imports - assume paths are correct
  import/no-duplicates: warn

overrides:
  # Jest globals for test files
  - files: ['**/*.test.ts', '**/*.spec.ts']
    env:
      jest: true

  # kotor-forge-vscode: use node resolver only (TS 5.9 vs typescript-eslint 6), ignore runtime/external modules
  - files: extensions/kotor-forge-vscode/**/*.ts
    settings:
      import/resolver: node
    rules:
      import/no-unresolved:
        - warn
        - ignore:
            - "^vscode$"
            - "^path$"
            - "^@vscode/"
            - "^vscode-languageclient"
            - "^@forge/"
            - '^\\.'
    globals:
      Thenable: readonly
