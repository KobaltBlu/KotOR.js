extends:
  - eslint:recommended
  - plugin:@typescript-eslint/strict
  - plugin:import/recommended
  - plugin:import/typescript
parser: "@typescript-eslint/parser"
parserOptions:
  ecmaVersion: 2022
  sourceType: module
  ecmaFeatures:
    jsx: true
  project: ./tsconfig.eslint.json
plugins:
  - "@typescript-eslint"
  - import
env:
  node: true
  browser: true
  es2022: true
globals:
  # File System Access API (browser)
  FileSystemFileHandle: readonly
  FileSystemDirectoryHandle: readonly
  FileSystemWritableFileStream: readonly
  # Node.js types (used in type positions; no-undef)
  NodeJS: readonly
  BufferEncoding: readonly
  Electron: readonly
settings:
  import/resolver: node
rules:
  # TypeScript strict (enforce no any; use proper types)
  "@typescript-eslint/no-unused-vars":
    - warn
    - argsIgnorePattern: "^_"
      varsIgnorePattern: "^_"
  "@typescript-eslint/explicit-function-return-type": off
  "@typescript-eslint/no-extraneous-class": off
  "@typescript-eslint/no-explicit-any": error
  "@typescript-eslint/no-unsafe-argument": error
  "@typescript-eslint/no-unsafe-assignment": error
  "@typescript-eslint/no-unsafe-call": error
  "@typescript-eslint/no-unsafe-member-access": error
  "@typescript-eslint/no-unsafe-return": error

  # Use shared logger instead of console (see src/utility/Logger.ts)
  no-console: error
  no-debugger: warn
  no-unused-vars: off # Use TypeScript version instead
  no-case-declarations: warn
  no-async-promise-executor: warn
  no-extra-semi: warn
  no-empty: warn
  no-constant-condition: warn
  no-prototype-builtins: warn
  no-fallthrough: warn
  no-useless-escape: warn
  no-cond-assign: warn
  no-inner-declarations: warn
  no-redeclare: warn
  no-unsafe-finally: warn
  no-control-regex: warn
  no-misleading-character-class: warn
  prefer-const: warn
  no-var: warn

  # Prefer @ path alias; forbid parent relative (../); same-dir (./) allowed for co-located styles
  no-restricted-imports:
    - error
    - patterns:
        - group:
            - "../*"
            - "../**"
          message: "Use @/ path alias instead of relative parent imports (e.g. from \"@/utility/Logger\")"

  # Import rules (warn only - do not block build/debug)
  import/order:
    - warn
    - groups:
        - builtin
        - external
        - internal
        - parent
        - sibling
        - index
      newlines-between: always
      alphabetize:
        order: asc
        caseInsensitive: true
      pathGroups:
        # Shallower parent imports first (../../ before ../../../)
        - pattern: "../../[^.]*/**"
          group: parent
          position: before
        - pattern: "../../../**"
          group: parent
          position: after
  import/no-unresolved:
    - warn
    - ignore:
        - "^@/"     # path alias (tsconfig paths)
        - "^\\./"   # relative imports - assume paths are correct
        - "^\\.\\." # parent relative imports - assume paths are correct
  import/no-duplicates: warn

overrides:
  # Only src/utility/Logger.ts may use console (designated bridge for log output)
  - files: ['src/utility/Logger.ts']
    rules:
      no-console: off
  # LSP server uses connection.console (not global console); allow for any legacy global console usage
  - files: ['extensions/kotor-forge-vscode/server/**/*.ts']
    rules:
      no-console: off

  # Jest globals for test files
  - files: ['**/*.test.ts', '**/*.spec.ts']
    env:
      jest: true

  # kotor-forge-vscode: use node resolver only; ignore runtime/external and shared @kotor paths
  - files: extensions/kotor-forge-vscode/**/*.{ts,tsx}
    settings:
      import/resolver: node
    rules:
      import/no-unresolved:
        - warn
        - ignore:
            - "^vscode$"
            - "^path$"
            - "^@vscode/"
            - "^vscode-languageclient"
            - "^@/"
            - "^@forge/"
            - "^@kotor/"
            - '^\\.'
    globals:
      Thenable: readonly
  # Webview: use extension tsconfig so parser resolves from repo root (avoids c:\tsconfig.webview.json on Windows)
  - files: extensions/kotor-forge-vscode/src/webview/**/*.{ts,tsx}
    parserOptions:
      project: extensions/kotor-forge-vscode/tsconfig.webview.json
