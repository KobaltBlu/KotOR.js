extends:
  - eslint:recommended
  - plugin:@typescript-eslint/strict
  - plugin:import/recommended
  - plugin:import/typescript
parser: "@typescript-eslint/parser"
parserOptions:
  ecmaVersion: 2022
  sourceType: module
  ecmaFeatures:
    jsx: true
  project: ./tsconfig.eslint.json
plugins:
  - "@typescript-eslint"
  - import
env:
  node: true
  browser: true
  es2022: true
globals:
  # File System Access API (browser)
  FileSystemFileHandle: readonly
  FileSystemDirectoryHandle: readonly
  FileSystemWritableFileStream: readonly
  # Node.js types (used in type positions; no-undef)
  NodeJS: readonly
  BufferEncoding: readonly
  Electron: readonly
settings:
  import/resolver: node
rules:
  # TypeScript specific rules
  '@typescript-eslint/no-unused-vars': off
  '@typescript-eslint/explicit-function-return-type': off
  "@typescript-eslint/no-extraneous-class": off
  '@typescript-eslint/no-explicit-any': off
  # Strict type safety: no any/unsafe usage
  "@typescript-eslint/no-unsafe-argument": off
  "@typescript-eslint/no-unsafe-assignment": off
  "@typescript-eslint/no-unsafe-call": off
  "@typescript-eslint/no-unsafe-member-access": off
  "@typescript-eslint/no-unsafe-return": off
  "@typescript-eslint/no-unsafe-function-type": off

  # Use shared logger instead of console (see src/utility/Logger.ts)
  no-console: off
  no-debugger: off
  no-unused-vars: off # Use TypeScript version instead
  no-case-declarations: off
  no-async-promise-executor: off
  no-extra-semi: off
  no-empty: off
  no-constant-condition: off
  no-prototype-builtins: off
  no-fallthrough: off
  no-useless-escape: off
  no-cond-assign: off
  no-inner-declarations: off
  no-redeclare: off
  no-unsafe-finally: off
  no-control-regex: off
  no-misleading-character-class: off
  prefer-const: off
  no-var: off

  # Prefer @ path alias; forbid parent relative (../); same-dir (./) allowed for co-located styles
  no-restricted-imports:
    - error
    - patterns:
        - group:
            - "./*"
            - "./**"
            - "../*"
            - "../**"
          message: "Use @/ path alias instead of relative imports"

  # Import rules (warn only - do not block build/debug)
  import/order: off
  import/no-unresolved: off
  import/no-duplicates: off

  # Strict rules enforced (fix violations; do not disable)
  "@typescript-eslint/no-non-null-assertion": off
  "@typescript-eslint/no-require-imports": off
  "@typescript-eslint/no-empty-object-type": off
  "@typescript-eslint/no-invalid-void-type": off
  "@typescript-eslint/no-useless-constructor": off
  "@typescript-eslint/no-dynamic-delete": off
  "@typescript-eslint/prefer-literal-enum-member": off
  "@typescript-eslint/no-unused-expressions": off
  "@typescript-eslint/prefer-as-const": off
  "@typescript-eslint/no-duplicate-enum-values": off
  "@typescript-eslint/unified-signatures": off
  "@typescript-eslint/no-this-alias": off
  "@typescript-eslint/triple-slash-reference": off
  "@typescript-eslint/ban-ts-comment": off
  no-unexpected-multiline: error
  no-extra-boolean-cast: off
  no-self-assign: off
  "@typescript-eslint/no-non-null-asserted-optional-chain": off
  no-mixed-spaces-and-tabs: off
  no-useless-catch: off
  no-loss-of-precision: off
  no-global-assign: off
  "@typescript-eslint/no-wrapper-object-types": off
  import/namespace: off
  no-duplicate-case: off

overrides:
  # Only src/utility/Logger.ts may use console (designated bridge for log output)
  - files: ['src/utility/Logger.ts']
    rules:
      no-console: off
  # LSP server uses connection.console (not global console); allow for any legacy global console usage
  - files: ['extensions/kotor-forge-vscode/server/**/*.ts']
    rules:
      no-console: off

  # Jest globals for test files
  - files: ['**/*.test.ts', '**/*.spec.ts']
    env:
      jest: true

  # Game/engine enums: duplicate values and non-literal members are intentional (mirror game data)
  - files: ['src/enums/**/*.ts', 'src/controls/KeyMapper.ts']
    rules:
      "@typescript-eslint/no-duplicate-enum-values": off
      "@typescript-eslint/prefer-literal-enum-member": off

  # kotor-forge-vscode: use node resolver only; ignore runtime/external and shared @kotor paths
  - files: extensions/kotor-forge-vscode/**/*.{ts,tsx}
    settings:
      import/resolver: node
    rules:
      import/no-unresolved:
        - warn
        - ignore:
            - "^vscode$"
            - "^path$"
            - "^@vscode/"
            - "^vscode-languageclient"
            - "^@/"
            - "^@forge/"
            - "^@kotor/"
            - '^\\.'
    globals:
      Thenable: readonly
  # Webview: use extension tsconfig so parser resolves from repo root (avoids c:\tsconfig.webview.json on Windows)
  - files: extensions/kotor-forge-vscode/src/webview/**/*.{ts,tsx}
    parserOptions:
      project: extensions/kotor-forge-vscode/tsconfig.webview.json
