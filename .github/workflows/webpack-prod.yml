name: Deploy Webpack PROD Bundle

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build and artifact upload only (skip S3 sync)
        required: false
        default: false
        type: boolean

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build webpack prod bundle
        run: npm run webpack:prod

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-prod
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Configure AWS credentials
        if: ${{ !inputs.dry_run }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Sync bundle to PROD S3 bucket
        if: ${{ !inputs.dry_run }}
        run: |
          aws s3 sync dist "s3://${{ secrets.AWS_BUCKET_PROD }}" --delete

      - name: Invalidate CloudFront Cache
        if: ${{ !inputs.dry_run }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID_PROD }} \
            --paths "/*"
