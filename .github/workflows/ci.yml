name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect changed files
        id: changed
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${PR_BASE_SHA}" ]; then
            base_sha="${PR_BASE_SHA}"
          elif [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            base_sha="${BEFORE_SHA}"
          else
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed_files="$(git diff --name-only "${base_sha}" "${HEAD_SHA}" || true)"
          echo "Changed files since ${base_sha}:"
          echo "${changed_files}"

          src_ts_files=""
          prettier_files=""

          while IFS= read -r file; do
            [ -z "${file}" ] && continue

            if [[ "${file}" == src/* ]] && [[ "${file}" == *.ts || "${file}" == *.tsx ]]; then
              src_ts_files="${src_ts_files}"$'\n'"${file}"
            fi

            case "${file}" in
              *.ts|*.tsx|*.js|*.jsx|*.json|*.md|*.yml|*.yaml)
                prettier_files="${prettier_files}"$'\n'"${file}"
                ;;
            esac
          done <<< "${changed_files}"

          {
            echo "src_ts_files<<EOF"
            echo "${src_ts_files}"
            echo "EOF"
            echo "prettier_files<<EOF"
            echo "${prettier_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Check formatting on changed files
        if: ${{ steps.changed.outputs.prettier_files != '' }}
        env:
          PRETTIER_FILES: ${{ steps.changed.outputs.prettier_files }}
        run: |
          set -euo pipefail
          printf '%s\n' "${PRETTIER_FILES}" | xargs -r npx prettier --check

      - name: Lint changed TypeScript files
        if: ${{ steps.changed.outputs.src_ts_files != '' }}
        env:
          SRC_TS_FILES: ${{ steps.changed.outputs.src_ts_files }}
        run: |
          set -euo pipefail
          printf '%s\n' "${SRC_TS_FILES}" | xargs -r npx cross-env ESLINT_USE_FLAT_CONFIG=false eslint

      - name: Run tests
        run: npm test

      - name: Compile Electron entrypoints
        run: npm run electron:compile

  build:
    name: Build bundles
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        mode: [dev, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run webpack:${{ matrix.mode }}

      - name: Verify launcher output exists
        run: test -f dist/launcher/index.html

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.mode }}
          path: dist
          if-no-files-found: error
          retention-days: 7

  vscode-extension-compile:
    name: VS Code extension compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install extension dependencies
        run: npm install --no-package-lock

      - name: Compile extension host + webview + language server
        run: npm run compile
