version: "3.9"

services:
  session-manager:
    image: node:22-bookworm
    working_dir: /workspace
    volumes:
      - ../../:/workspace
      - session-manager-data:/workspace/services/forge-vscode-session-manager/data
    environment:
      FORGE_SESSION_MANAGER_PORT: "8090"
      FORGE_SESSION_MANAGER_DATA_ROOT: "/workspace/services/forge-vscode-session-manager/data"
      FORGE_SESSION_MANAGER_MAX_SESSIONS: "16"
      FORGE_SESSION_MANAGER_TTL_MS: "2700000"
      FORGE_SESSION_MANAGER_WARNING_MS: "300000"
      FORGE_SESSION_MANAGER_MAX_WORKSPACE_BYTES: "0"
      FORGE_SESSION_MANAGER_RETENTION_MS: "259200000"
      FORGE_OPENVSCODE_BASE_URL: "http://127.0.0.1:18080"
      FORGE_SESSION_MANAGER_PUBLIC_BASE_URL: "http://127.0.0.1:8090"
      FORGE_SESSION_MANAGER_ADMIN_TOKEN: "dev-admin-token"
      FORGE_SESSION_MANAGER_ALLOWED_UPSTREAM_HOSTS: "openvscode,127.0.0.1,localhost"
    command: >
      bash -lc "npx tsc services/forge-vscode-session-manager/src/server.ts services/forge-vscode-session-manager/src/SessionManagerCore.ts --target ES2020 --module commonjs --outDir services/forge-vscode-session-manager/dist --esModuleInterop --skipLibCheck && node services/forge-vscode-session-manager/dist/server.js"
    ports:
      - "8090:8090"

  openvscode:
    image: gitpod/openvscode-server:latest
    depends_on:
      - session-manager
    command:
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - --without-connection-token
    ports:
      - "18080:3000"

  session-orchestrator:
    image: node:22-bookworm
    depends_on:
      - session-manager
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    environment:
      FORGE_SESSION_MANAGER_BASE_URL: "http://session-manager:8090"
      FORGE_SESSION_MANAGER_ADMIN_TOKEN: "dev-admin-token"
      FORGE_SESSION_ORCHESTRATOR_POLL_MS: "1000"
      FORGE_SESSION_ORCHESTRATOR_MODE: "mock"
      FORGE_OPENVSCODE_BASE_URL: "http://openvscode:3000"
    command: >
      bash -lc "node scripts/session-manager-orchestrator.mjs"

volumes:
  session-manager-data:
